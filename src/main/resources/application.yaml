spring:
  application:
    name: supermarket
  datasource:
    url: jdbc:h2:mem:supermarket;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

logging:
  level:
    org.springframework.web: DEBUG

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0


sections:
  HORNO: 8
  CAJAS: 16
  PESCADERIA: 16
  VERDURAS: 16
  DROGUERIA: 16

api:
  reports:
    url: http://localhost:8080/stores/%s
    pageSize: 100

resilience4j:
 retry:
    retry-aspect-order: 1
    instances:
      webClientRetry:
        maxAttempts: 3                
        waitDuration: 2s 
        enableExponentialBackoff: true 
        exponentialBackoffMultiplier: 
        retryExceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
 circuitbreaker:
   circuit-breaker-aspect-order: 2
   instances:
     webClientCB:
       slidingWindowSize: 5
       minimumNumberOfCalls: 3
       failureRateThreshold: 50
       waitDurationInOpenState: 10s


scheduler:
  reset-sections-cron: "0 0 1 * * ?"

jwt: 
  secret-key: 2f4f7a1b3c9d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1
  expiration-time: 86400000